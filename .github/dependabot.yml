version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "npm"
    groups:
      vue:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-*"
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "nuxt-*"
      typescript:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "ts-*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-*"
      types:
        patterns:
          - "@types/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "github-actions"